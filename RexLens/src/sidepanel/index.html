<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rex Lens</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Auth Screen -->
    <div id="auth-screen" class="screen">
      <div class="logo-section">
        <div class="logo">🔍</div>
        <h1>Rex Lens</h1>
        <p class="subtitle">AI Sales Coach</p>
      </div>
      <div class="auth-card">
        <input type="text" id="username-input" placeholder="Username" autocomplete="username" />
        <input type="password" id="password-input" placeholder="Password" autocomplete="current-password" />
        <button id="login-btn" class="btn-primary">Sign In</button>
        <p id="login-error" class="error-text" style="display:none"></p>
      </div>
    </div>

    <!-- Locked Screen -->
    <div id="locked-screen" class="screen" style="display:none">
      <div class="logo-section">
        <div class="logo">🔒</div>
        <h1>Rex Lens</h1>
        <p class="subtitle">Upgrade Required</p>
      </div>
      <div class="auth-card">
        <p>Your Rex Lens subscription is inactive or expired.</p>
        <p style="margin-top:8px">Visit <a href="https://rexlens.ai" target="_blank" class="link">rexlens.ai</a> to subscribe</p>
        <button id="logout-locked-btn" class="btn-secondary">Sign Out</button>
      </div>
    </div>

    <!-- Main Chat Screen -->
    <div id="main-screen" class="screen" style="display:none">
      <div class="chat-header">
        <div class="chat-header-left">
          <span class="chat-header-title">Rex</span>
          <span id="page-indicator" class="page-indicator" title="Page context loaded">●</span>
        </div>
        <div class="chat-header-right">
          <button id="refresh-btn" class="btn-icon" title="Re-read page">↻</button>
          <button id="logout-btn" class="btn-icon" title="Sign Out">⏻</button>
        </div>
      </div>

      <div id="chat-messages" class="chat-messages"></div>

      <div class="chat-input-area">
        <div class="chat-input-row">
          <input type="text" id="chat-input" placeholder="Ask Rex anything..." autocomplete="off" />
          <button id="chat-send-btn" class="btn-send" title="Send">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="../../dist/sidepanel.js"></script>
</body>
</html>
