<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rex Lens</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Auth Screen -->
    <div id="auth-screen" class="screen">
      <div class="logo-section">
        <div class="logo">🔍</div>
        <h1>Rex Lens</h1>
        <p class="subtitle">AI Sales Coach</p>
      </div>

      <div id="login-form" class="card">
        <input type="text" id="username-input" placeholder="Username" autocomplete="username" />
        <input type="password" id="password-input" placeholder="Password" autocomplete="current-password" />
        <button id="login-btn" class="btn-primary">Sign In</button>
        <p id="login-error" class="error-text" style="display:none"></p>
      </div>
    </div>

    <!-- Locked Screen -->
    <div id="locked-screen" class="screen" style="display:none">
      <div class="logo-section">
        <div class="logo">🔒</div>
        <h1>Rex Lens</h1>
        <p class="subtitle">Upgrade Required</p>
      </div>
      <div class="card">
        <p>Your Rex Lens subscription is inactive or expired.</p>
        <p style="margin-top:8px">Visit <a href="https://rexlens.ai" target="_blank" style="color:#4F46E5">rexlens.ai</a> to subscribe</p>
        <button id="logout-locked-btn" class="btn-secondary">Sign Out</button>
      </div>
    </div>

    <!-- Main Screen -->
    <div id="main-screen" class="screen" style="display:none">
      <!-- Header -->
      <div class="header">
        <div class="header-left">
          <span class="header-title">Rex Lens</span>
          <span id="status-badge" class="badge badge-idle">Idle</span>
        </div>
        <div class="header-right">
          <button id="logout-btn" class="btn-icon" title="Sign Out">⏻</button>
        </div>
      </div>

      <!-- Scan Button -->
      <div class="scan-section">
        <button id="scan-btn" class="btn-primary btn-scan">
          <span id="scan-btn-text">Scan Page</span>
        </button>
        <span class="hint">or press Ctrl+Shift+R</span>
      </div>

      <!-- Scan Results -->
      <div id="scan-results" style="display:none">
        <div class="card-header" style="padding: 0 0 8px 0">
          <span class="card-icon">📋</span>
          <span class="card-title">Scan Results</span>
          <span id="scan-count" class="badge badge-ready" style="margin-left:auto">0 items</span>
        </div>
        <div id="scan-items"></div>

        <!-- Deep Review Button (shown after scan results) -->
        <div id="deep-review-section" style="display:none">
          <button id="deep-review-btn" class="btn-primary btn-scan" style="margin-top:8px">
            <span id="deep-review-btn-text">Deep Review</span>
          </button>
          <span id="deep-review-estimate" class="hint" style="text-align:center;display:block;margin-top:4px"></span>
        </div>
      </div>

      <!-- Deep Review Progress -->
      <div id="deep-review-progress" class="card" style="display:none">
        <div class="card-header">
          <span class="card-icon">🔍</span>
          <span class="card-title">Deep Review</span>
        </div>
        <div class="progress-bar-container">
          <div id="deep-review-bar" class="progress-bar" style="width:0%"></div>
        </div>
        <p id="deep-review-status" class="hint">Starting...</p>
        <button id="deep-review-cancel-btn" class="btn-secondary btn-sm">Cancel</button>
      </div>

      <!-- Deep Review Results (game plan cards) -->
      <div id="deep-review-results" style="display:none">
        <div class="card-header" style="padding: 0 0 8px 0">
          <span class="card-icon">🎯</span>
          <span class="card-title">Game Plan</span>
          <span id="deep-review-badge" class="badge badge-ready" style="margin-left:auto">0 leads</span>
        </div>
        <div id="deep-review-cards"></div>
      </div>

      <!-- Rex Chat -->
      <div id="chat-section" class="chat-section">
        <div class="card-header">
          <span class="card-icon">🤖</span>
          <span class="card-title">Ask Rex</span>
        </div>
        <div id="chat-messages" class="chat-messages"></div>
        <div class="chat-input-row">
          <input type="text" id="chat-input" placeholder="Ask Rex a follow-up..." />
          <button id="chat-send-btn" class="btn-primary btn-sm">Send</button>
        </div>
      </div>

    </div>
  </div>

  <script src="../../dist/sidepanel.js"></script>
</body>
</html>
